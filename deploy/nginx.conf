# /etc/nginx/sites-available/deploy-sa
# Reverse proxy for Deploy.sa -> Next.js on 127.0.0.1:3000
# Certbot will inject the SSL (443) block automatically after `certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name deploy.wafgate.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE (live build logs): disable buffering, long timeout.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
