# ModSecurity + OWASP CRS reverse proxy (per-site WAF).
# Sits between Traefik and the app containers:
#   Traefik (*.apps -> here) -> ModSecurity (CRS + per-site rules) -> app
#
# Per-site nginx server blocks live in ./sites (generated by the agent on
# deploy), and per-site rule files in ./rules (written by the agent's /waf).
services:
  modsec:
    image: owasp/modsecurity-crs:4-nginx-alpine
    container_name: modsec
    restart: unless-stopped
    environment:
      # CRS in blocking mode; tune as needed.
      MODSEC_RULE_ENGINE: "On"
      PARANOIA: "1"
      # Upstream is set per-site in the generated server blocks instead.
      BACKEND: "http://127.0.0.1:8080"
    volumes:
      - /etc/modsec-sites:/etc/modsec-sites:ro        # per-site SecLang rule files
      - ./sites:/etc/nginx/templates/sites:ro          # per-site server blocks
    networks:
      - web
    labels:
      # Receive ALL app subdomains; ModSec routes to the right app by Host.
      - "traefik.enable=true"
      - "traefik.http.routers.apps-waf.rule=HostRegexp(`{sub:[a-z0-9-]+}.apps.deploy.wafgate.com`)"
      - "traefik.http.routers.apps-waf.entrypoints=websecure"
      - "traefik.http.routers.apps-waf.tls.certresolver=le"
      - "traefik.http.services.apps-waf.loadbalancer.server.port=8080"

networks:
  web:
    external: true
